name: Hourly Threat Crawler

on:
  schedule:
    - cron: '*/5 * * * *' # Set back to a stable 1-hour interval
  workflow_dispatch: 

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Scraper
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scraper.py

      - name: Save Results to Repository
        run: |
          git config --local user.email "security@automation.bot"
          git config --local user.name "Threat Crawler Bot"
          
          # 1. Add the new data first so Git knows it's safe
          git add data.json
          
          # 2. Commit the changes locally
          git commit -m "Update threat data" || echo "No changes to commit"
          
          # 3. NOW we pull and rebase to sync with the main branch
          git pull origin main --rebase
          
          # 4. Push it live
          git push origin main
