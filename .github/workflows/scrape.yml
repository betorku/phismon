name: Hourly Threat Crawler

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # This tells GitHub to fetch all history, preventing sync errors

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Scraper
        run: python scraper.py

      - name: Save Results to Repository
        run: |
          git config --local user.email "security@automation.bot"
          git config --local user.name "Threat Crawler Bot"
          git add data.json
          git commit -m "Update hourly threat data" || echo "No new threats found"
          git pull --rebase origin main
          git push
