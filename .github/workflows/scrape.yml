name: Hourly Threat Crawler

on:
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 of every hour
  workflow_dispatch: # Allows manual click to run

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to save data.json

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Scraper
        run: python scraper.py

      - name: Save Results to Repository
        run: |
          git config --local user.email "security@automation.bot"
          git config --local user.name "Threat Crawler Bot"
          git add data.json
          git commit -m "Update hourly threat data" || echo "No new threats found"
          git push
