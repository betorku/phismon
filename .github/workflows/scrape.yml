name: Hourly Threat Crawler

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Prevent overlapping executions
concurrency:
  group: phishing-monitor
  cancel-in-progress: true

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    timeout-minutes: 20

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # PYTHON
      # =====================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =====================================================
      # DEPENDENCIES
      # =====================================================

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =====================================================
      # EXECUTE SCRAPER
      # =====================================================

      - name: Run Threat Scraper
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python scraper.py

      # =====================================================
      # VERIFY OUTPUT
      # =====================================================

      - name: Verify Output
        run: |
          if [ ! -f data.json ]; then
            echo "data.json not found!"
            exit 1
          fi

          cat data.json | jq empty

      # =====================================================
      # COMMIT RESULTS
      # =====================================================

      - name: Commit and Push Results
        run: |

          git config user.name "Threat Crawler Bot"
          git config user.email "security@automation.bot"

          git add data.json

          # Check if anything changed
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Automated threat intelligence update"

          # Retry-safe pull
          git pull --rebase origin main

          # Push
          git push origin HEAD:main

      # =====================================================
      # OPTIONAL: SAVE ARTIFACT
      # =====================================================

      - name: Upload Threat Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: phishing-results
          path: data.json
